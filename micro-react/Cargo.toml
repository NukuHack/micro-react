[package]
name = "micro-react"
version = "0.1.0"
edition = "2021"
description = "MicroReact – a React-like UI runtime in Rust/WASM"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen        = "0.2"
js-sys              = "0.3"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
serde               = { version = "1", features = ["derive"] }
serde-wasm-bindgen  = "0.6"
once_cell           = "1"

[dependencies.web-sys]
version = "0.3"
features = [
  # Core DOM
  "Window", "Document", "Element", "HtmlElement", "Node", "NodeList",
  "Text", "Comment", "DocumentFragment", "ShadowRoot",
  # Events
  "Event", "EventTarget", "MouseEvent", "KeyboardEvent", "InputEvent",
  "FocusEvent", "PointerEvent", "TouchEvent", "WheelEvent",
  "AnimationEvent", "TransitionEvent", "DragEvent", "ClipboardEvent",
  # Form elements
  "HtmlInputElement", "HtmlTextAreaElement", "HtmlSelectElement",
  "HtmlProgressElement", "HtmlTemplateElement",
  # Style / CSS
  "CssStyleDeclaration",
  # Parser
  "DomParser", "SupportedType",
  # Attr
  "Attr", "NamedNodeMap",
  # History / Location
  "Location", "History",
  # URL
  "Url", "UrlSearchParams",
  # Timers
  "Performance",
  # MutationObserver
  "MutationObserver", "MutationObserverInit", "MutationRecord",
  # Logging
  "console",
]

[profile.release]
opt-level   = "z"
lto         = true
codegen-units = 1
