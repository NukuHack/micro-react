<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>micro-react demo</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
<div id="root"></div>

<script>
if(sessionStorage.redirect){
  history.replaceState(null,'',sessionStorage.redirect);
  sessionStorage.removeItem('redirect');
}
</script>

<script type="module">
// Boot WASM (needed so the module is genuinely loaded/used)
window.MicroReact = await import('./micro-react/pkg/micro_react.js')
  .then(async (m) => { await m.default(); return m; });

// Fragment / ErrorBoundary / html aren't plain wasm-bindgen exports,
// so derive them here once, right after init.
window.Fragment = MicroReact.getFragment();
window.ErrorBoundary = MicroReact.createErrorBoundary();
window.html = (statics, ...values) => MicroReact.htmlTemplate(statics, values);

window.loadJsxModule = MicroReact.loadJsxModule;
// Make everything available globally
// Object.assign(window, MicroReact);
window.useState = MicroReact.useState;
window.useReducer = MicroReact.useReducer;
window.useEffect = MicroReact.useEffect;
window.useLayoutEffect = MicroReact.useLayoutEffect;
window.useRef = MicroReact.useRef;
window.useMemo = MicroReact.useMemo;
window.useCallback = MicroReact.useCallback;
window.useId = MicroReact.useId;
window.createContext = MicroReact.createContext;
window.useContext = MicroReact.useContext;
window.memo = MicroReact.memo;
window.Router = MicroReact.Router;
window.Link = MicroReact.Link;
window.useLocation = MicroReact.useLocation;
window.useNavigate = MicroReact.useNavigate;
window.render = MicroReact.render;

await import('./script.js');
</script>
</body>
</html>
