<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>micro-react demo</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
<div id="root"></div>

<script>
/// this for 404's custom redirect
if (sessionStorage.redirect) {
  history.replaceState(null, '', sessionStorage.redirect);
  sessionStorage.removeItem('redirect');
}
</script>

<script type="module">
// Boot WASM (needed so the module is genuinely loaded/used)
window.MicroReact = await import('./micro-react/pkg/micro_react.js')
  .then(async (m) => { await m.default(); return m; });

// Fragment / ErrorBoundary / html aren't plain wasm-bindgen exports,
// so derive them here once, right after init.
window.Fragment = MicroReact.getFragment();
window.ErrorBoundary = MicroReact.createErrorBoundary();
window.html = (txt, ...val) => MicroReact.htmlTemplate(txt, val);

// Make everything available globally
Object.assign(window, MicroReact);
window.ejsx = (txt) => eval(jsx(txt));



// тФАтФАтФА NAV тФАтФАтФА
function Nav() {
  return html`
    <nav>
      <div class="nav-brand"><span style="font-size:1.2rem">тЪЫ</span>micro<span>-react</span></div>
      <${NavLink} to="/" class="nav-link">ЁЯПа Home</${NavLink}>
      <${NavLink} to="/about" class="nav-link">ЁЯУЦ About</${NavLink}>
      <${NavLink} to="/hello" class="nav-link">ЁЯСЛ Hello</${NavLink}>
    </nav>
  `;
}

// тФАтФАтФА SHELL тФАтФАтФА
function Shell() {
  const {theme, setTheme} = useContext(ThemeCtx);
  
  return html`
    <${Fragment}>
      <${Nav} />
      <${Outlet} context=${{ThemeCtx}}/>
      <div style="position:fixed;bottom:1.25rem;right:1.25rem;display:flex;gap:.4rem;z-index:999;background:var(--surface);border:1px solid var(--border);padding:.4rem;border-radius:10px">
        ${themes.map((t, i) => html`
          <button key="${t.name}" class="btn-ghost btn-sm${theme.idx === i ? ' btn-primary' : ''}" onclick="${() => setTheme(i)}" title="${t.label}">${t.label.split(' ')[0]}</button>
        `)}
      </div>
    </${Fragment}>
  `;
}

// тФАтФАтФА THEME CONTEXT тФАтФАтФА
const themes = [
  { name: 'dark',  label: 'ЁЯМС Dark', idx: 0  },
  { name: 'light', label: 'тШАя╕П Light', idx: 1 },
  { name: 'neon',  label: 'ЁЯЯй Neon', idx: 2  },
];
const ThemeCtx = createContext();

// тФАтФАтФА APP ROOT  (provides theme context + router) тФАтФАтФА
function App() {
  const [theme, _setTheme] = useState(themes[0]);
  const setTheme = (inp) => _setTheme(themes[inp % themes.length]);

  let OldJs = html`<${Router} routes="${{
    '/':      () => html`<${Shell} Page=${HomePage} />`,
    '/about': () => html`<${Shell} Page=${AboutPage} />`,
    '/hello': () => html`<${Shell} Page=${HelloPage} />`,
    '*': () => html`<${Shell} Page=${NotFound} />`,
  }}" />`;

  let NewJsx = html`
  <${Routes}>
    <${Route} path="/" element=${html`<${Shell} />`}>
      <${Route} index element=${html`<${HomePage} />`} />
      <${Route} path="/about" element=${html`<${AboutPage} />`} />
      <${Route} path="/hello" element=${html`<${HelloPage} />`} />
      <${Route} path="*" element=${html`<${NotFound} />`} />
    </${Route}>
  </${Routes}>`;

  return html`
    <${ThemeCtx.Provider} value=${{theme, setTheme}} >
      ${NewJsx}
    </${ThemeCtx.Provider}>
  `;
}

// тФАтФАтФА JSX LOADER DEMO тФАтФАтФА
const [
  { default: HomePage }, { default: HelloPage },
  { default: NotFound }, { default: AboutPage }
] = await Promise.all([
  loadJsx('./home.jsx'), loadJsx('./hello.jsx'),
  loadJsx('./404.jsx'), loadJsx('./about.jsx')
]);

window.__root = await render(ejsx(`<App />`), document.getElementById('root'));
</script>

</body>
</html>
