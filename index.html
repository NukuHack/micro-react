<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>micro-react demo</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
<div id="root"></div>

<script type="module">
// used to be just : import MicroReact from './micro-react.js';
import initWasm, * as MicroReact from './micro-react/pkg/micro_react.js';
// Boot WASM (needed so the module is genuinely loaded/used)
await initWasm();

// Fragment / ErrorBoundary / html aren't plain wasm-bindgen exports (a Symbol
// and two closures aren't representable as bindgen statics), so they're
// derived here, once, right after init — no post-build patching required.
const Fragment = MicroReact.getFragment();
const ErrorBoundary = MicroReact.createErrorBoundary();
const html = (statics, ...values) => MicroReact.htmlTemplate(statics, values);
// wasm-bindgen exports have fixed arity — the generated createElement(type,
// props, children) shim only ever reads its first 3 arguments. script.js
// calls h(type, props, child1, child2, ...) in the React/JS-API variadic
// style, so without this wrapper every extra child silently vanishes (and
// even a single child arrives as a bare value instead of the array Rust
// expects). Collect the rest params into a real array before crossing into
// wasm, matching what the pure-JS createElement(type, props, ...args) did.
const h = (type, props, ...children) => MicroReact.createElement(type, props, children);

// Make everything available globally
window.h = h;
window.Fragment = Fragment;
window.html = html;
window.ErrorBoundary = ErrorBoundary;
window.useState = MicroReact.useState;
window.useReducer = MicroReact.useReducer;
window.useEffect = MicroReact.useEffect;
window.useLayoutEffect = MicroReact.useLayoutEffect;
window.useRef = MicroReact.useRef;
window.useMemo = MicroReact.useMemo;
window.useCallback = MicroReact.useCallback;
window.useId = MicroReact.useId;
window.createContext = MicroReact.createContext;
window.memo = MicroReact.memo;
window.Router = MicroReact.Router;
window.Link = MicroReact.Link;
window.useLocation = MicroReact.useLocation;
window.useNavigate = MicroReact.useNavigate;
window.render = MicroReact.render;

await import('./script.js');
</script>
</body>
</html>
